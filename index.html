<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>To-Do App</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <header class="top">
      <div class="brand">
        <div class="avatar" id="avatar" aria-hidden="true">?</div>

        <div class="brandText">
          <h1 id="userTitle">To-Do App</h1>
          <p class="sub">Plan smart. Execute daily. Saved automatically ✅</p>
          <button id="changeNameBtn" class="ghost small" type="button">Change name</button>
        </div>
      </div>

      <div class="stats">
        <div class="pill"><span id="today"></span></div>
        <div class="pill">Active: <b id="activeCount">0</b></div>
        <div class="pill">Completed: <b id="doneCount">0</b></div>
      </div>
    </header>

    <section class="inputRow">
      <input id="taskInput" type="text" placeholder="Add a task..." autocomplete="off" />
      <button id="addBtn" type="button">Add Task</button>
    </section>

    <section class="controls">
      <div class="filters" role="tablist" aria-label="Filters">
        <button class="filter active" data-filter="all" type="button">All</button>
        <button class="filter" data-filter="active" type="button">Active</button>
        <button class="filter" data-filter="completed" type="button">Completed</button>
      </div>

      <div class="meta">
        <span id="count">0 items left</span>
        <button id="clearCompleted" class="ghost" type="button">Clear completed</button>
      </div>
    </section>

    <ul id="list" class="list" aria-label="Task list"></ul>

    <footer class="footer"></footer>
    </main>
  </body>
</html>
